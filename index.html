<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.png" type="image/png">
    <title>Save the Date | Ramy & Mamphara</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* UPDATED COLOR PALETTE: 
  Neutral background with elegant Sepedi accent colors (Blue, Pink, Yellow) 
*/
        :root {
            --envelope-cream: #Fdfbf7;
            --paper: #Faf8f5;
            --sepedi-blue: #1A365D;
            /* Deep elegant blue */
            --sepedi-pink: #D81159;
            /* Vibrant Sepedi pink */
            --sepedi-pink-dark: #B00D47;
            --sepedi-yellow: #FFBC42;
            /* Warm accent yellow */
            --text: #2D3748;
            /* Dark text for contrast */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MOBILE FRAME */
        .container {
            position: relative;
            width: min(100vw, 420px);
            aspect-ratio: 9/16;
            overflow: hidden;
            background: var(--envelope-cream);
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* SECTIONS */
        .section {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity .45s ease;
        }

        .section.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ENVELOPE */
        .envelope-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .6s ease;
            background-color: var(--envelope-cream);
            /* Fallback envelope color */
        }

        .envelope-wrapper.zoom {
            transform: scale(1.08);
        }

        /* ENVELOPE IMAGE */
        .envelope-img {
            width: 100%;
            height: 125%;
            object-fit: cover;
            object-position: center center;
        }

        /* WAX SEAL */
        .seal-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            max-width: 500px;
            cursor: pointer;
            transition: transform .6s ease;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, .35));
        }

        /* SEAL OPENING ANIMATION */
        .seal-img.rise {
            transform: translate(-50%, calc(-50% - 20px)) rotate(0deg) scale(1.08);
        }

        /* SAVE THE DATE */
        #savethedate-section {
            background: var(--paper);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 36px 28px;
            color: var(--text);
        }

        .save-content {
            max-width: 280px;
        }

        /* SAVE THE DATE TITLE */
        .save-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--sepedi-blue);
            margin-bottom: 1.2rem;
        }

        /* COUPLE NAMES */
        .couple-names {
            font-family: 'Great Vibes', cursive;
            font-size: 2.6rem;
            color: var(--sepedi-pink);
            margin-bottom: .6rem;
        }

        /* GOLD DIVIDER */
        .divider {
            width: 60px;
            height: 2px;
            background: var(--sepedi-yellow);
            margin: 14px auto 18px;
            border-radius: 2px;
        }

        /* DATE */
        .save-content .date {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--sepedi-blue);
            margin-bottom: 0.8rem;
        }

        /* SUBTEXT */
        .save-content p {
            font-size: .95rem;
            line-height: 1.6;
            margin: .3rem 0;
            color: #4a5568;
        }


        /* SAVE THE DATE */
        #savethedate-section {
            background: var(--paper);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px;
            color: var(--text);
        }

        .save-content {
            max-width: 260px;
        }

        .save-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 6px;
            color: var(--sepedi-blue);
            border-bottom: 2px solid var(--sepedi-yellow);
            /* Yellow accent */
            padding-bottom: .6rem;
            margin-bottom: 1rem;
        }

        .save-content p {
            font-size: 1.05rem;
            line-height: 1.6;
            margin: .4rem 0;
        }

        .save-content .date {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 600;
            color: var(--sepedi-pink);
            /* Pink accent */
            margin: 1rem 0;
        }

        /* COUNTDOWN */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 14px;
        }

        .countdown div {
            font-size: .85rem;
            color: var(--text);
        }

        .countdown span {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            display: block;
            color: var(--sepedi-blue);
            min-width: 32px;
        }

        /* CALENDAR BUTTON */
        .calendar-container {
            margin-top: 24px;
            position: relative;
        }

        #calendarBtn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: var(--sepedi-pink);
            color: white;
            cursor: pointer;
            font-size: .95rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-decoration: none;
            /* Important for <a> tag */
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(216, 17, 89, 0.25);
        }

        #calendarBtn:hover {
            background: var(--sepedi-pink-dark);
            transform: translateY(-2px);
        }

        #calendarBtn:active {
            transform: translateY(0);
        }

        .back-link {
            margin-top: 2rem;
            font-size: .9rem;
            color: var(--sepedi-blue);
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- ENVELOPE SECTION -->
        <section id="envelope-section" class="section active">
            <div class="envelope-wrapper" id="envelopeWrapper">
                <img src="./assets/rm-envelope.png" class="envelope-img" alt="Envelope">
                <img src="./assets/rm-wax-seal.png" class="seal-img" id="waxSeal" alt="Wax Seal">
            </div>
        </section>


        <!-- SAVE THE DATE SECTION -->
        <section id="savethedate-section" class="section">
            <div class="save-content">

                <h1>Save the Date</h1>

                <div class="couple-names">
                    Ramy & Mamphara
                </div>

                <div class="divider"></div>

                <p class="date">26 September 2026</p>

                <p>
                    We invite you to celebrate our union.<br>
                    Formal invitation to follow.
                </p>


                <!-- COUNTDOWN -->
                <div class="countdown">
                    <div><span id="days">00</span>Days</div>
                    <div><span id="hours">00</span>Hours</div>
                    <div><span id="minutes">00</span>Min</div>
                    <div><span id="seconds">00</span>Sec</div>
                </div>

                <!-- ADD TO CALENDAR (Direct Download) -->
                <div class="calendar-container">
                    <!-- Changed to an anchor tag for direct download -->
                    <a id="calendarBtn" download="wedding-celebration.ics">Add to Calendar</a>
                </div>

                <div class="back-link" id="backBtn">← Back to Envelope</div>

            </div>
        </section>

    </div>

    <script>

        /* =========================
           ENVELOPE OPENING LOGIC
        ========================= */

        const seal = document.getElementById("waxSeal");
        const envelope = document.getElementById("envelopeWrapper");
        const envelopeSection = document.getElementById("envelope-section");
        const saveSection = document.getElementById("savethedate-section");
        const backBtn = document.getElementById("backBtn");

        let animating = false;

        function openEnvelope() {
            if (animating) return;
            animating = true;

            seal.classList.add("rise");
            envelope.classList.add("zoom");

            setTimeout(() => {
                envelopeSection.classList.remove("active");
                saveSection.classList.add("active");

                seal.classList.remove("rise");
                envelope.classList.remove("zoom");

                animating = false;
            }, 550);
        }

        function showEnvelope() {
            saveSection.classList.remove("active");
            envelopeSection.classList.add("active");
        }

        seal.addEventListener("click", openEnvelope);
        backBtn.addEventListener("click", showEnvelope);



        /* =========================
           COUNTDOWN TIMER
        ========================= */

        const weddingDate = new Date("September 26, 2026 15:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            // Prevent negative numbers if date has passed
            if (distance < 0) return;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

        }, 1000);



        /* =========================
           iCALENDAR (.ics) GENERATOR
        ========================= */

        const eventTitle = "Wedding Celebration";
        const eventDescription = "Join us for our wedding celebration!";
        const eventLocation = "Pretoria, South Africa";

        /* FORMAT: YYYYMMDDTHHmmssZ */
        const startDate = "20260926T000000";
        const endDate = "20260926T235900";


        /* Generate the raw .ics text content */
        const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Our Wedding//EN
BEGIN:VEVENT
UID:${new Date().getTime()}@ourwedding.com
DTSTAMP:20260926T000000Z
SUMMARY:${eventTitle}
DESCRIPTION:${eventDescription}
LOCATION:${eventLocation}
DTSTART:${startDate}
DTEND:${endDate}
STATUS:CONFIRMED
END:VEVENT
END:VCALENDAR`;

        /* Convert text to a downloadable file blob */
        const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        /* Attach it directly to the button */
        document.getElementById("calendarBtn").href = url;

    </script>

</body>

</html>
